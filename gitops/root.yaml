# App-of-apps: Argo CD sincroniza todo lo que viva en gitops/apps/.
# Requiere que ESTE repo esté en git (Argo hace pull del repoURL).
# Test local: empuja el repo y pon tu repoURL abajo (o instala los charts con helm).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/andrezc98/sre-que-nunca-duerme.git
    targetRevision: HEAD
    path: gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
