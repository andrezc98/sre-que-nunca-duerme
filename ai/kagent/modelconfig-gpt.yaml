# GPT (open-weight de OpenAI) vía Bedrock: mismo cluster, cuarto cerebro.
# El endpoint Mantle de Bedrock es OpenAI-compatible (Chat Completions), asi que
# entra por provider OpenAI con baseUrl. Auth: Bedrock API key (bearer), NO SigV4:
#   kubectl create secret generic bedrock-api-key -n kagent \
#     --from-literal=OPENAI_API_KEY=<bedrock api key>
# (La API key se genera en la consola de Bedrock; requiere acceso al modelo openai.*)
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: gpt-oss-bedrock
  namespace: kagent
spec:
  provider: OpenAI
  model: openai.gpt-oss-120b
  apiKeySecret: bedrock-api-key
  apiKeySecretKey: OPENAI_API_KEY   # obligatorio para provider OpenAI (no para Bedrock)
  openAI:
    baseUrl: https://bedrock-mantle.us-east-1.api.aws/v1
